# 静的リンク済みの利用者プログラム専用jailです。
name: "smart-c-runtime"
mode: ONCE
log_level: ERROR
hostname: "smart-c-runtime"
cwd: "/workspace"
time_limit: 120
max_cpus: 1

clone_newnet: true
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: false
keep_caps: false
keep_env: false
disable_no_new_privs: false

rlimit_as: 128
rlimit_core: 0
rlimit_cpu: 3
rlimit_fsize: 1
rlimit_nofile: 16
rlimit_nproc: 8
rlimit_nproc_type: VALUE

uidmap {
    inside_id: "65534"
    outside_id: ""
    count: 1
}
gidmap {
    inside_id: "65534"
    outside_id: ""
    count: 1
}

envar: "HOME=/nonexistent"
envar: "LANG=C.UTF-8"
envar: "LC_ALL=C.UTF-8"
envar: "TERM=xterm-256color"

mount {
    src: "/jail"
    dst: "/"
    is_bind: true
    rw: false
}
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    options: "size=8M"
    nosuid: true
    nodev: true
    noexec: true
}
