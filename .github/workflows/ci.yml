name: CI

on:
    push:
    pull_request:

permissions:
    contents: read

jobs:
    verify:
        runs-on: ubuntu-24.04
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.20.0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy,rustfmt

            - name: Install JavaScript dependencies
              run: pnpm install --frozen-lockfile

            - name: Verify JavaScript and Rust
              run: pnpm verify

            - name: Validate Compose
              env:
                  PUBLIC_HOST: localhost
                  SITE_ADDRESS: http://localhost
                  WEB_VISITOR_SECRET: ci-web-visitor-secret-with-sufficient-length
                  LSP_INTERNAL_TOKEN: ci-lsp-internal-token-with-sufficient-length
                  LSP_TICKET_SECRET: ci-lsp-ticket-secret-with-sufficient-length
                  EXECUTOR_INTERNAL_TOKEN: ci-executor-internal-token-with-sufficient-length
                  EXECUTOR_TICKET_SECRET: ci-executor-ticket-secret-with-sufficient-length
                  WORKER_SERVICE_TOKEN: ci-worker-service-token-with-sufficient-length
                  WEB_ORIGIN: http://localhost
              run: |
                  docker compose config
                  docker compose -f compose.yaml -f compose.prod.yaml config
                  docker compose -f compose.yaml -f compose.prod.yaml -f compose.runtime-smoke.yaml config
                  docker compose -f compose.yaml -f compose.apparmor.yaml config
                  docker compose -f compose.yaml -f compose.prod.yaml -f compose.apparmor.yaml config
                  docker compose -f compose.yaml -f compose.prod.yaml -f compose.runtime-smoke.yaml -f compose.apparmor.yaml config

    images:
        runs-on: ubuntu-24.04
        timeout-minutes: 45
        needs: verify
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup QEMU
              uses: docker/setup-qemu-action@v3

            - name: Setup Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build amd64 and arm64 images
              uses: docker/bake-action@v6
              with:
                  files: docker-bake.hcl
                  targets: ci
                  set: "*.output=type=cacheonly"
